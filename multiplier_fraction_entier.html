<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplier une fraction par un entier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fff7ed; min-height: 100vh; }
  h1 { text-align: center; padding: 14px; background: #92400e; color: white; font-size: 1.2em; }
  .tabs { display: flex; justify-content: center; gap: 8px; padding: 10px 8px; flex-wrap: wrap; }
  .tab { padding: 9px 18px; border-radius: 20px; border: none; font-size: 0.82em; cursor: pointer; font-weight: bold; transition: all 0.2s; }
  .tab1 { background: #fef3c7; color: #78350f; border: 2px solid #fcd34d; }
  .tab2 { background: #dcfce7; color: #14532d; border: 2px solid #6ee7b7; }
  .tab1.active { background: #b45309; color: white; border-color: #b45309; }
  .tab2.active { background: #15803d; color: white; border-color: #15803d; }

  .scene { display: flex; flex-direction: column; align-items: center; padding: 8px; }
  svg#fig { width: 100%; max-width: 480px; height: 290px; background: white; border-radius: 14px; box-shadow: 0 2px 10px #0002; display: block; }

  .calc-box { background: white; border-radius: 14px; padding: 13px 18px; margin: 6px auto; max-width: 480px; width: 95%; box-shadow: 0 2px 8px #0002; border-left: 5px solid #b45309; font-size: 0.97em; line-height: 2.1; }
  .enonce { font-weight: bold; border-radius: 8px; padding: 6px 12px; margin-bottom: 8px; font-size: 0.92em; }
  .en1 { background: #fef3c7; color: #78350f; }
  .en2 { background: #dcfce7; color: #14532d; }
  .ligne { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 2px 0; }
  .hl-o { color: #b45309; font-weight: bold; }
  .hl-r { color: #dc2626; font-weight: bold; }
  .hl-g { color: #15803d; font-weight: bold; }
  .hl-b { color: #1d4ed8; font-weight: bold; }
  .fr { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 4px; line-height: 1.2; }
  .fr .n { border-bottom: 2px solid currentColor; padding: 0 6px; font-size: 1em; }
  .fr .d { padding: 0 6px; font-size: 1em; }
  .conclusion-ok { background: #dcfce7; border-left: 4px solid #22c55e; padding: 7px 14px; border-radius: 8px; font-weight: bold; color: #14532d; margin-top: 6px; }
  .attention { background: #fff7ed; border-left: 4px solid #f97316; padding: 6px 12px; border-radius: 7px; margin-top: 6px; color: #7c2d12; font-size: 0.91em; }

  .explication { background: white; border-radius: 14px; padding: 10px 16px; margin: 6px auto; max-width: 480px; width: 95%; font-size: 0.95em; color: #333; box-shadow: 0 2px 8px #0001; border-left: 5px solid #ccc; }
  .etape-ind { text-align: center; color: #999; font-size: 0.86em; margin-bottom: 3px; }
  .btns { display: flex; gap: 12px; justify-content: center; margin: 8px; }
  button.nav { padding: 10px 28px; border-radius: 22px; border: none; font-size: 1em; cursor: pointer; font-weight: bold; }
  .btn-prev { background: #e9ecef; color: #555; }
  .btn-next { background: #b45309; color: white; }
</style>
</head>
<body>
<h1>✖️ Multiplier une fraction par un entier</h1>
<div class="tabs">
  <button class="tab tab1 active" onclick="setMode(0)">Sens et méthode</button>
  <button class="tab tab2" onclick="setMode(1)">Simplifier le résultat</button>
</div>
<div class="scene">
  <svg id="fig" viewBox="0 0 480 290"></svg>
  <div class="calc-box" id="calc-box"></div>
  <div class="explication" id="explication"></div>
  <div class="etape-ind" id="etape-ind"></div>
  <div class="btns">
    <button class="nav btn-prev" onclick="prev()">◀ Précédent</button>
    <button class="nav btn-next" onclick="next()">Suivant ▶</button>
  </div>
</div>

<script>
var mode=0, etape=0;
var COLS=['#b45309','#15803d'];

// ─── Helpers SVG ───────────────────────────────────────────
function T(x,y,s,col,sz,anc,bold){
  sz=sz||12; anc=anc||'middle'; bold=bold||false;
  return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" text-anchor="'+anc
    +'" fill="'+col+'" font-weight="'+(bold?'bold':'normal')
    +'" font-family="Segoe UI,sans-serif">'+s+'</text>';
}
function R(x,y,w,h,rx,fill,stroke,sw){
  stroke=stroke||'none'; sw=sw||1;
  return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h
    +'" rx="'+rx+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';
}
function L(x1,y1,x2,y2,col,w,dash){
  w=w||1.5; dash=dash||'';
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2
    +'" stroke="'+col+'" stroke-width="'+w+'" stroke-dasharray="'+dash+'" stroke-linecap="round"/>';
}

// ─── Barre fractionnaire dessinée en SVG ──────────────────
// Dessine une barre divisée en "den" parts, "num" coloriées, à (x,y), taille (w,h)
function barreFrac(x,y,w,h,den,num,colFill,colEmpty,colStroke){
  colFill=colFill||'#fcd34d'; colEmpty=colEmpty||'#fef3c7'; colStroke=colStroke||'#92400e';
  var pw=w/den;
  var svg='';
  for(var i=0;i<den;i++){
    var fill=i<num?colFill:colEmpty;
    svg+=R(x+i*pw,y,pw,h,0,fill,colStroke,1.5);
  }
  return svg;
}

// Dessine plusieurs barres empilées (pour illustrer k × p/q)
function barresMultiples(x,y,w,h,gap,den,num,nb,colFill,colEmpty,colStroke){
  var svg='';
  for(var b=0;b<nb;b++){
    svg+=barreFrac(x,y+b*(h+gap),w,h,den,num,colFill,colEmpty,colStroke);
    // accolade + fraction à gauche
    svg+=T(x-8,y+b*(h+gap)+h/2+4,'×'+(b+1),'#94a3b8',8,'end');
  }
  return svg;
}

// ════════════════════════════════════════════════════════════
// ONGLET 0 — SENS ET MÉTHODE
// ════════════════════════════════════════════════════════════
var e0=[

  // Étape 1 : sens — fraction comme addition répétée
  {
    explic:"Multiplier 3 × (2/5) signifie prendre 3 fois la fraction 2/5, comme une addition répétée : 2/5 + 2/5 + 2/5. On colorie 2 parts sur 5 à chaque fois.",
    draw:function(){
      var h='';
      h+=T(240,20,'3 × ','#92400e',15,'middle',true);
      // Fraction 2/5 dans le titre
      h+=T(268,14,'2','#dc2626',14,'middle',true);
      h+=L(258,18,278,18,'#dc2626',2);
      h+=T(268,28,'5','#dc2626',14,'middle',true);
      h+=T(240,20,'= ?','#92400e',15,'middle',true);

      // Titre corrigé propre
      h='';
      h+=T(120,22,'3  ×','#92400e',16,'middle',true);
      // Fraction
      h+=T(172,15,'2','#dc2626',16,'middle',true);
      h+=L(160,20,184,20,'#dc2626',2);
      h+=T(172,31,'5','#dc2626',16,'middle',true);
      h+=T(210,22,'=','#92400e',16,'middle',true);
      h+=T(240,15,'2','#b45309',16,'middle',true);
      h+=L(228,20,252,20,'#b45309',2);
      h+=T(240,31,'5','#b45309',16,'middle',true);
      h+=T(266,22,'+','#b45309',16,'middle',true);
      h+=T(296,15,'2','#b45309',16,'middle',true);
      h+=L(284,20,308,20,'#b45309',2);
      h+=T(296,31,'5','#b45309',16,'middle',true);
      h+=T(322,22,'+','#b45309',16,'middle',true);
      h+=T(352,15,'2','#b45309',16,'middle',true);
      h+=L(340,20,364,20,'#b45309',2);
      h+=T(352,31,'5','#b45309',16,'middle',true);

      // 3 barres empilées
      var bx=50,by=55,bw=340,bh=46,gap=10;
      var cols=['#fcd34d','#f97316','#fb923c'];
      for(var i=0;i<3;i++){
        h+=barreFrac(bx,by+i*(bh+gap),bw,bh,5,2,cols[i],'#fef3c7','#92400e');
        h+=T(bx-6,by+i*(bh+gap)+bh/2+4,'×'+(i+1),'#92400e',10,'end',true);
      }

      // Accolade globale
      h+=L(bx+bw+10,by,bx+bw+10,by+3*(bh+gap)-gap,'#92400e',2);
      h+=L(bx+bw+10,by,bx+bw+16,by,'#92400e',2);
      h+=L(bx+bw+10,by+3*(bh+gap)-gap,bx+bw+16,by+3*(bh+gap)-gap,'#92400e',2);
      // Total colorié
      h+=T(bx+bw+22,by+1.5*(bh+gap)-gap/2,'6 parts','#92400e',10,'start',true);
      h+=T(bx+bw+22,by+1.5*(bh+gap)-gap/2+14,'coloriées','#92400e',10,'start');

      // Résultat
      h+=R(80,238,320,42,10,'#92400e');
      h+=T(240,254,'3  ×','white',14,'middle',true);
      h+=T(282,248,'2','white',14,'middle',true);
      h+=L(271,252,293,252,'white',1.5);
      h+=T(282,264,'5','white',14,'middle',true);
      h+=T(308,254,'=','white',14,'middle',true);
      h+=T(338,248,'6','#fde68a',16,'middle',true);
      h+=L(326,252,350,252,'white',1.5);
      h+=T(338,264,'5','#fde68a',16,'middle',true);
      return h;
    },
    calc:'<div class="enonce en1">Sens : 3 × <span class="fr hl-r"><span class="n">2</span><span class="d">5</span></span> = ?</div>'
      +'<div class="ligne"><span class="hl-o">Multiplier</span> par un entier = addition répétée :</div>'
      +'<div class="ligne">3 × <span class="fr hl-r"><span class="n">2</span><span class="d">5</span></span> = <span class="fr hl-r"><span class="n">2</span><span class="d">5</span></span> + <span class="fr hl-r"><span class="n">2</span><span class="d">5</span></span> + <span class="fr hl-r"><span class="n">2</span><span class="d">5</span></span></div>'
      +'<div class="ligne">= <span class="fr hl-o"><span class="n">2+2+2</span><span class="d">5</span></span> = <span class="fr hl-o"><span class="n">6</span><span class="d">5</span></span></div>'
      +'<div class="attention">💡 On répète le numérateur, le dénominateur ne change pas !</div>'
  },

  // Étape 2 : règle — on multiplie seulement le numérateur
  {
    explic:"La règle est simple : pour multiplier une fraction par un entier, on multiplie uniquement le numérateur par cet entier. Le dénominateur reste identique.",
    draw:function(){
      var h='';
      h+=T(240,22,'Règle : multiplier le numérateur','#92400e',13,'middle',true);

      // Schéma de la règle
      h+=R(60,40,360,80,12,'#92400e');
      // Calcul en grand
      h+=T(120,75,'n','white',22,'middle',true);
      h+=T(140,75,'×  k','white',22,'middle',true); // affichage simplifié
      // fraction propre
      h+=T(100,65,'n','white',20,'middle',true);
      h+=L(85,70,115,70,'white',2);
      h+=T(100,86,'d','white',20,'middle',true);
      h+=T(138,75,'× k','white',16,'middle',true);
      h+=T(172,75,'=','white',18,'middle',true);
      h+=T(210,65,'n × k','#fde68a',18,'middle',true);
      h+=L(185,70,235,70,'white',2);
      h+=T(210,86,'d','white',18,'middle',true);

      // Flèche "entier multiplie le numérateur"
      h+='<path d="M138,60 Q175,38 210,58" fill="none" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="4,3"/>';
      h+='<polygon points="210,58 202,52 206,62" fill="#fde68a"/>';
      h+=T(175,34,'l\'entier multiplie','#fde68a',9,'middle');
      h+=T(175,46,'le numérateur','#fde68a',9,'middle');

      // Flèche "dénominateur inchangé"
      h+='<path d="M138,88 Q175,108 185,90" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>';
      h+=T(160,112,'dénominateur','#93c5fd',9,'middle');
      h+=T(160,124,'inchangé','#93c5fd',9,'middle');

      // 3 exemples
      var exs=[
        {calc:'4 ×', n:3, d:7, res_n:12, res_d:7, col:'#dc2626'},
        {calc:'5 ×', n:2, d:9, res_n:10, res_d:9, col:'#1d4ed8'},
        {calc:'6 ×', n:1, d:4, res_n:6,  res_d:4, col:'#15803d'}
      ];
      var ey=148, gap2=46;
      exs.forEach(function(ex,i){
        var ey2=ey+i*gap2;
        h+=R(30,ey2,420,38,8,'white',ex.col,1.5);
        // calcul
        h+=T(60,ey2+14,ex.calc,ex.col,13,'middle',true);
        h+=T(88,ey2+10,''+ex.n,ex.col,14,'middle',true);
        h+=L(76,ey2+14,100,ey2+14,ex.col,1.5);
        h+=T(88,ey2+26,''+ex.d,ex.col,14,'middle',true);
        h+=T(116,ey2+18,'=',ex.col,14,'middle',true);
        // numérateur multiplié
        h+=T(150,ey2+10,ex.calc.replace('×','').trim()+'×'+ex.n,'#b45309',12,'middle',true);
        h+=L(130,ey2+14,170,ey2+14,ex.col,1.5);
        h+=T(150,ey2+26,''+ex.d,ex.col,14,'middle',true);
        h+=T(188,ey2+18,'=',ex.col,14,'middle',true);
        h+=T(220,ey2+10,''+ex.res_n,'#14532d',16,'middle',true);
        h+=L(205,ey2+14,235,ey2+14,ex.col,2);
        h+=T(220,ey2+26,''+ex.res_d,'#14532d',16,'middle',true);
      });
      return h;
    },
    calc:'<div class="enonce en1">Règle</div>'
      +'<div class="ligne"><span class="hl-o">k</span> × <span class="fr"><span class="n">n</span><span class="d">d</span></span> = <span class="fr"><span class="n"><span class="hl-o">k</span> × n</span><span class="d">d</span></span></div>'
      +'<div class="ligne">On multiplie <span class="hl-o">uniquement le numérateur</span> par k.</div>'
      +'<div class="ligne">Le dénominateur <b>ne change pas</b>.</div>'
      +'<div class="ligne">• 4 × <span class="fr hl-r"><span class="n">3</span><span class="d">7</span></span> = <span class="fr hl-r"><span class="n">12</span><span class="d">7</span></span></div>'
      +'<div class="ligne">• 5 × <span class="fr hl-b"><span class="n">2</span><span class="d">9</span></span> = <span class="fr hl-b"><span class="n">10</span><span class="d">9</span></span></div>'
      +'<div class="ligne">• 6 × <span class="fr hl-g"><span class="n">1</span><span class="d">4</span></span> = <span class="fr hl-g"><span class="n">6</span><span class="d">4</span></span></div>'
  },

  // Étape 3 : application visuelle — 4 × 3/8
  {
    explic:"Application : calculons 4 × (3/8). On prend 4 fois la fraction 3/8. On colorie 3 cases sur 8 à chaque fois. Au total : 4 × 3 = 12 cases coloriées sur 8.",
    draw:function(){
      var h='';
      h+=T(240,18,'Application : 4 ×','#92400e',13,'middle',true);
      h+=T(320,13,'3','#dc2626',14,'middle',true);
      h+=L(308,17,332,17,'#dc2626',2);
      h+=T(320,29,'8','#dc2626',14,'middle',true);

      // 4 barres de 8 cases, 3 coloriées
      var bx=35,by=45,bw=370,bh=38,gap=8;
      var cols4=['#fcd34d','#fb923c','#f97316','#ea580c'];
      for(var i=0;i<4;i++){
        h+=barreFrac(bx,by+i*(bh+gap),bw,bh,8,3,cols4[i],'#fef3c7','#92400e');
        // étiquette à droite
        h+=T(bx+bw+12,by+i*(bh+gap)+bh/2+4,'3/8','#92400e',10,'start',true);
      }
      // Accolade
      h+=L(bx+bw+30,by,bx+bw+30,by+4*(bh+gap)-gap,'#92400e',2);
      h+=L(bx+bw+30,by,bx+bw+36,by,'#92400e',2);
      h+=L(bx+bw+30,by+4*(bh+gap)-gap,bx+bw+36,by+4*(bh+gap)-gap,'#92400e',2);
      h+=T(bx+bw+38,by+2*(bh+gap),'4×3=12','#92400e',10,'start',true);
      h+=T(bx+bw+38,by+2*(bh+gap)+14,'parts','#92400e',10,'start');

      // Résultat
      h+=R(100,240,280,42,10,'#92400e');
      h+=T(180,256,'4  ×','white',14,'middle',true);
      h+=T(215,250,'3','white',14,'middle',true);
      h+=L(203,254,227,254,'white',2);
      h+=T(215,266,'8','white',14,'middle',true);
      h+=T(242,256,'=','white',14,'middle',true);
      h+=T(272,250,'12','#fde68a',16,'middle',true);
      h+=L(260,254,284,254,'white',2);
      h+=T(272,266,'8','#fde68a',16,'middle',true);
      return h;
    },
    calc:'<div class="enonce en1">4 × <span class="fr hl-r"><span class="n">3</span><span class="d">8</span></span> = ?</div>'
      +'<div class="ligne">On prend <span class="hl-o">4 fois</span> la fraction <span class="fr hl-r"><span class="n">3</span><span class="d">8</span></span></div>'
      +'<div class="ligne">= 4 × 3 cases coloriées sur 8 = <span class="hl-o">12 cases</span></div>'
      +'<div class="ligne">4 × <span class="fr hl-r"><span class="n">3</span><span class="d">8</span></span> = <span class="fr hl-o"><span class="n">4 × 3</span><span class="d">8</span></span> = <span class="fr hl-o"><span class="n">12</span><span class="d">8</span></span></div>'
      +'<div class="attention">💡 12/8 > 1 : c\'est une fraction supérieure à 1, ce n\'est pas un problème !</div>'
  },

  // Étape 4 : cas où le résultat est un entier
  {
    explic:"Parfois le résultat est un nombre entier. C'est le cas quand le numérateur du résultat est un multiple du dénominateur. Exemple : 4 × (3/4) = 12/4 = 3.",
    draw:function(){
      var h='';
      h+=T(240,18,'Cas particulier : résultat entier','#92400e',13,'middle',true);

      // 4 barres de 4 cases, 3 coloriées
      var bx=50,by=42,bw=320,bh=42,gap=10;
      for(var i=0;i<4;i++){
        h+=barreFrac(bx,by+i*(bh+gap),bw,bh,4,3,'#fcd34d','#fef3c7','#92400e');
      }
      // 3 barres complètes = 3 entiers (regroupement)
      // Lignes verticales de regroupement
      var pw=bw/4;
      for(var j=1;j<=3;j++){
        h+=L(bx+j*pw,by-4,bx+j*pw,by+4*(bh+gap)-gap+4,'#dc2626',1.5,'5,3');
      }
      h+=T(bx+0.5*pw,by-10,'1 entier','#dc2626',9,'middle');
      h+=T(bx+1.5*pw,by-10,'1 entier','#dc2626',9,'middle');
      h+=T(bx+2.5*pw,by-10,'1 entier','#dc2626',9,'middle');

      // Calcul détaillé
      h+=R(30,220,420,60,10,'#92400e');
      h+=T(130,242,'4 ×','white',14,'middle',true);
      h+=T(164,236,'3','white',15,'middle',true);
      h+=L(152,240,176,240,'white',2);
      h+=T(164,252,'4','white',15,'middle',true);
      h+=T(192,242,'=','white',14,'middle',true);
      h+=T(222,236,'4×3','white',14,'middle',true);
      h+=L(210,240,234,240,'white',1.5);
      h+=T(222,252,'4','white',15,'middle',true);
      h+=T(252,242,'=','white',14,'middle',true);
      h+=T(282,236,'12','white',15,'middle',true);
      h+=L(270,240,294,240,'white',1.5);
      h+=T(282,252,'4','white',15,'middle',true);
      h+=T(312,242,'=','white',14,'middle',true);
      h+=T(355,242,'3','#fde68a',22,'middle',true);
      h+=T(390,242,'✓','#fde68a',18,'middle',true);

      h+=T(240,272,'12 ÷ 4 = 3  →  le résultat est un entier','white',10,'middle');
      return h;
    },
    calc:'<div class="enonce en1">Cas particulier : 4 × <span class="fr hl-o"><span class="n">3</span><span class="d">4</span></span></div>'
      +'<div class="ligne">4 × <span class="fr hl-o"><span class="n">3</span><span class="d">4</span></span> = <span class="fr hl-o"><span class="n">4 × 3</span><span class="d">4</span></span> = <span class="fr hl-o"><span class="n">12</span><span class="d">4</span></span> = <span class="hl-o">3</span></div>'
      +'<div class="ligne">Quand <b>le numérateur est divisible par le dénominateur</b>, le résultat est un entier.</div>'
      +'<div class="conclusion-ok">4 barres de 3/4 = 3 barres entières = 3  ✓</div>'
  }
];

// ════════════════════════════════════════════════════════════
// ONGLET 1 — SIMPLIFIER LE RÉSULTAT
// ════════════════════════════════════════════════════════════
var e1=[

  // Étape 1 : rappel simplification
  {
    explic:"Après avoir multiplié, on simplifie toujours si possible. Simplifier une fraction, c'est diviser le numérateur et le dénominateur par un même nombre (leur diviseur commun).",
    draw:function(){
      var h='';
      h+=T(240,20,'Simplifier une fraction','#14532d',13,'middle',true);
      h+=T(240,36,'Diviser numérateur et dénominateur par le même nombre','#374151',10);

      // Exemple 6/4 → 3/2
      h+=R(30,50,420,105,12,'#14532d');
      h+=T(240,70,'Exemple :','white',12,'middle',true);
      // 6/4
      h+=T(120,88,'6','white',26,'middle',true);
      h+=L(100,94,140,94,'white',2.5);
      h+=T(120,110,'4','white',26,'middle',true);
      // ÷2 flèches

// ─── Moteur ────────────────────────────────────────────────
var ETAPES=[e0,e1];
function setMode(m){
  mode=m; etape=0;
  document.querySelectorAll('.tab').forEach(function(tab,i){ tab.classList.toggle('active',i===m); });
  document.querySelector('.btn-next').style.background=COLS[m];
  document.getElementById('calc-box').style.borderLeftColor=COLS[m];
  render();
}
function prev(){ if(etape>0){ etape--; render(); } }
function next(){ if(etape<ETAPES[mode].length-1){ etape++; render(); } }
function render(){
  var e=ETAPES[mode][etape];
  document.getElementById('fig').innerHTML=e.draw();
  document.getElementById('calc-box').innerHTML=e.calc;
  document.getElementById('explication').textContent=e.explic;
  document.getElementById('etape-ind').textContent='Étape '+(etape+1)+' / '+ETAPES[mode].length;
}
render();
