<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construire des diagrammes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fafafa; min-height: 100vh; }
  h1 { text-align: center; padding: 15px; background: #0f766e; color: white; font-size: 1.3em; }
  .tabs { display: flex; justify-content: center; gap: 6px; padding: 11px 8px; flex-wrap: wrap; }
  .tab { padding: 9px 14px; border-radius: 20px; border: none; font-size: 0.83em; cursor: pointer; font-weight: bold; transition: all 0.2s; }
  .tab1 { background: #ccfbf1; color: #134e4a; border: 2px solid #5eead4; }
  .tab2 { background: #fef3c7; color: #78350f; border: 2px solid #fcd34d; }
  .tab3 { background: #ede9fe; color: #4c1d95; border: 2px solid #a78bfa; }
  .tab1.active { background: #0f766e; color: white; border-color: #0f766e; }
  .tab2.active { background: #b45309; color: white; border-color: #b45309; }
  .tab3.active { background: #6d28d9; color: white; border-color: #6d28d9; }

  .scene { display: flex; flex-direction: column; align-items: center; padding: 8px; }

  /* Tableau données en haut */
  .data-table { background: white; border-radius: 10px; box-shadow: 0 1px 6px #0002; overflow: hidden; margin: 8px auto; max-width: 480px; width: 95%; }
  .data-table table { border-collapse: collapse; width: 100%; }
  .data-table th { padding: 7px 10px; font-size: 0.85em; color: white; background: #0f766e; }
  .data-table td { padding: 7px 10px; text-align: center; font-size: 0.9em; font-weight: bold; border: 1px solid #e5e7eb; }
  .data-table td.hl { background: #fef9c3; color: #713f12; }

  svg#diag { width: 100%; max-width: 480px; height: 260px; background: white; border-radius: 14px; box-shadow: 0 2px 10px #0002; display: block; }

  .explication { background: white; border-radius: 14px; padding: 12px 18px; margin: 8px auto; max-width: 460px; width: 95%; font-size: 0.96em; color: #222; box-shadow: 0 2px 8px #0001; border-left: 5px solid #0f766e; min-height: 50px; }
  .etape-ind { text-align: center; color: #999; font-size: 0.88em; margin-bottom: 4px; }
  .btns { display: flex; gap: 12px; justify-content: center; margin: 8px; }
  button.nav { padding: 10px 28px; border-radius: 22px; border: none; font-size: 1em; cursor: pointer; font-weight: bold; }
  .btn-prev { background: #e9ecef; color: #555; }
  .btn-next { background: #0f766e; color: white; }
</style>
</head>
<body>
<h1>📊 Construire des diagrammes</h1>
<div class="tabs">
  <button class="tab tab1 active" onclick="setMode(0)">Diagramme en barres</button>
  <button class="tab tab2" onclick="setMode(1)">Diagramme circulaire</button>
  <button class="tab tab3" onclick="setMode(2)">Diagramme cartésien</button>
</div>
<div class="scene">
  <div class="data-table" id="data-table"></div>
  <svg id="diag" viewBox="0 0 480 260"></svg>
  <div class="explication" id="explication"></div>
  <div class="etape-ind" id="etape-ind"></div>
  <div class="btns">
    <button class="nav btn-prev" onclick="prev()">◀ Précédent</button>
    <button class="nav btn-next" onclick="next()">Suivant ▶</button>
  </div>
</div>

<script>
let mode = 0, etape = 0;

// ============================================================
// DONNÉES COMMUNES
// Sports préférés : Football 12, Natation 8, Tennis 5, Basket 3, Autre 2
// ============================================================
const barData = [
  { label: 'Football', val: 12, color: '#0d9488' },
  { label: 'Natation', val: 8,  color: '#2dd4bf' },
  { label: 'Tennis',   val: 5,  color: '#6ee7b7' },
  { label: 'Basket',   val: 3,  color: '#a7f3d0' },
  { label: 'Autre',    val: 2,  color: '#d1fae5' },
];
const pieData = [
  { label: 'Football', val: 12, pct: 40, deg: 144, color: '#b45309' },
  { label: 'Natation', val: 8,  pct: 27, deg:  96, color: '#f59e0b' },
  { label: 'Tennis',   val: 5,  pct: 17, deg:  60, color: '#fcd34d' },
  { label: 'Basket',   val: 3,  pct: 10, deg:  36, color: '#fde68a' },
  { label: 'Autre',    val: 2,  pct: 7,  deg:  24, color: '#fef3c7' },
];
const lineData = [
  { label: 'Jan', val: 4  },
  { label: 'Fév', val: 5  },
  { label: 'Mar', val: 9  },
  { label: 'Avr', val: 13 },
  { label: 'Mai', val: 17 },
  { label: 'Juin',val: 21 },
];

// ============================================================
// ÉTAPES
// ============================================================
const barEtapes = [
  { text: "On veut construire un diagramme en barres à partir du tableau. Première étape : on trace les deux axes. L'axe vertical (ordonnées) pour les valeurs, l'axe horizontal (abscisses) pour les catégories.", step: 'axes', hl: -1 },
  { text: "On gradue l'axe vertical. La valeur maximale est 12, donc on va jusqu'à 14 par pas de 2. On trace des lignes de repère légères.", step: 'grille', hl: -1 },
  { text: "On place les étiquettes des catégories sur l'axe horizontal : Football, Natation, Tennis, Basket, Autre.", step: 'labels', hl: -1 },
  { text: "On trace la première barre : Football = 12. On monte jusqu'à la graduation 12 et on colorie.", step: 'bar1', hl: 0 },
  { text: "On trace la deuxième barre : Natation = 8. On monte jusqu'à la graduation 8.", step: 'bar2', hl: 1 },
  { text: "On trace les barres Tenis = 5, Basket = 3 et Autre = 2.", step: 'bar345', hl: -1 },
  { text: "✅ Le diagramme est complet ! On ajoute un titre et une légende. La hauteur de chaque barre correspond à la valeur du tableau.", step: 'done', hl: -1 },
];

const pieEtapes = [
  { text: "On veut construire un diagramme circulaire. D'abord on convertit chaque valeur en degrés : angle = (valeur ÷ total) × 360°. Total = 30 élèves.", step: 'calcul', hl: -1 },
  { text: "Football : (12÷30) × 360 = 144°. On trace le cercle et on place le premier secteur depuis 0° en tournant de 144°.", step: 'sec1', hl: 0 },
  { text: "Natation : (8÷30) × 360 ≈ 96°. On repart du dernier trait et on tourne encore de 96°.", step: 'sec2', hl: 1 },
  { text: "Tennis : (5÷30) × 360 = 60°. Basket : (3÷30) × 360 = 36°. Autre : (2÷30) × 360 ≈ 24°.", step: 'sec345', hl: -1 },
  { text: "✅ Le diagramme est complet ! On colorie chaque secteur et on ajoute les étiquettes avec les pourcentages.", step: 'done', hl: -1 },
];

const lineEtapes = [
  { text: "On veut construire un diagramme cartésien pour les températures. On trace les deux axes : mois en abscisses, températures en ordonnées.", step: 'axes', hl: -1 },
  { text: "On gradue l'axe vertical de 0 à 25°C par pas de 5. On place les mois sur l'axe horizontal.", step: 'grille', hl: -1 },
  { text: "On place le premier point : Janvier = 4°C. On cherche la colonne Janvier et on monte jusqu'à 4 sur l'axe vertical.", step: 'pt1', hl: 0 },
  { text: "On place les points Février (5°C), Mars (9°C) et Avril (13°C).", step: 'pt234', hl: 3 },
  { text: "On place Mai (17°C) et Juin (21°C).", step: 'pt56', hl: 5 },
  { text: "On relie tous les points dans l'ordre par des segments de droite.", step: 'line', hl: -1 },
  { text: "✅ Le diagramme est complet ! On peut optionnellement colorier la zone sous la courbe pour mieux visualiser l'évolution.", step: 'done', hl: -1 },
];

// ============================================================
function setMode(m) {
  mode = m; etape = 0;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===m));
  const cols = ['#0f766e','#b45309','#6d28d9'];
  document.querySelector('.btn-next').style.background = cols[m];
  document.getElementById('explication').style.borderLeftColor = cols[m];
  render();
}
function prev() { if (etape > 0) { etape--; render(); } }
function next() {
  const maxE = [barEtapes, pieEtapes, lineEtapes][mode].length;
  if (etape < maxE-1) { etape++; render(); }
}

// ============================================================
// TABLE DE DONNÉES
// ============================================================
function renderDataTable(hlIdx, cols) {
  const data = mode === 2 ? lineData : barData;
  const headers = mode === 2 ? ['Mois','Temp. (°C)'] : ['Sport','Nb élèves'];
  let html = `<table><thead><tr>${headers.map(h=>`<th style="background:${cols}">${h}</th>`).join('')}</tr></thead><tbody><tr>`;
  data.forEach((d,i) => {
    const cls = i===hlIdx ? 'hl' : '';
    html += `<td class="${cls}">${d.label}</td>`;
  });
  html += '</tr><tr>';
  data.forEach((d,i) => {
    const cls = i===hlIdx ? 'hl' : '';
    html += `<td class="${cls}">${d.val}</td>`;
  });
  html += '</tr></tbody></table>';
  document.getElementById('data-table').innerHTML = html;
}

// ============================================================
// BARRES
// ============================================================
function drawBars(step, hl) {
  const W=480,H=260,padL=42,padB=42,padT=20,padR=14;
  const chartW=W-padL-padR, chartH=H-padB-padT;
  const maxVal=14, n=barData.length;
  const barW=chartW/n*0.55, gap=chartW/n;
  let h='';

  // Axes (toujours)
  h += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#374151" stroke-width="2.5"/>`;
  h += `<line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#374151" stroke-width="2.5"/>`;
  // Pointes de flèche
  h += `<polygon points="${padL},${padT-2} ${padL-4},${padT+10} ${padL+4},${padT+10}" fill="#374151"/>`;
  h += `<polygon points="${W-padR+2},${padT+chartH} ${W-padR-10},${padT+chartH-4} ${W-padR-10},${padT+chartH+4}" fill="#374151"/>`;
  h += `<text x="${padL-12}" y="${padT-4}" font-size="10" fill="#374151" text-anchor="middle">nb</text>`;

  if (step==='axes') return h;

  // Grille
  for (let v=0;v<=maxVal;v+=2) {
    const y=padT+chartH-(v/maxVal)*chartH;
    h += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1"/>`;
    h += `<text x="${padL-5}" y="${(y+4).toFixed(1)}" font-size="11" text-anchor="end" fill="#6b7280">${v}</text>`;
  }
  if (step==='grille') return h;

  // Labels abscisses
  barData.forEach((d,i)=>{
    const x=padL+i*gap+(gap-barW)/2+barW/2;
    h += `<text x="${x.toFixed(1)}" y="${(padT+chartH+14).toFixed(1)}" font-size="10" text-anchor="middle" fill="#374151">${d.label}</text>`;
  });
  if (step==='labels') return h;

  // Barres progressives
  const drawUpTo = step==='bar1'?1 : step==='bar2'?2 : step==='bar345'||step==='done'?5 : 0;
  barData.forEach((d,i)=>{
    if (i>=drawUpTo) return;
    const x=padL+i*gap+(gap-barW)/2;
    const bH=(d.val/maxVal)*chartH;
    const y=padT+chartH-bH;
    const isHL = i===hl;
    const fill = step==='done' ? d.color : isHL ? '#f97316' : d.color;
    h += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${bH.toFixed(1)}" fill="${fill}" rx="3"/>`;
    // Valeur sur barre
    if (isHL || step==='done') {
      h += `<text x="${(x+barW/2).toFixed(1)}" y="${(y-5).toFixed(1)}" font-size="11" font-weight="bold" text-anchor="middle" fill="${isHL?'#c2410c':'#374151'}">${d.val}</text>`;
    }
    // Ligne pointillée de construction
    if (isHL) {
      h += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${(x+barW/2).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      h += `<circle cx="${padL}" cy="${y.toFixed(1)}" r="4" fill="#f97316"/>`;
    }
  });
  if (step==='done') {
    h += `<text x="${(padL+chartW/2).toFixed(0)}" y="16" font-size="13" font-weight="bold" text-anchor="middle" fill="#0f766e">Sports préférés des élèves</text>`;
  }
  return h;
}

// ============================================================
// CAMEMBERT
// ============================================================
function drawPie(step, hl) {
  const cx=165, cy=130, r=105;
  let h='';

  // Cercle vide toujours visible
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>`;

  if (step==='calcul') {
    // Afficher tableau de calcul des angles
    h += `<rect x="290" y="20" width="175" height="210" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>`;
    h += `<text x="377" y="42" font-size="12" font-weight="bold" text-anchor="middle" fill="#78350f">Calcul des angles</text>`;
    pieData.forEach((d,i)=>{
      const y=65+i*34;
      h += `<rect x="300" y="${y-14}" width="12" height="12" fill="${d.color}" rx="2"/>`;
      h += `<text x="318" y="${y}" font-size="10" fill="#374151">${d.label} : ${d.val}÷30×360</text>`;
      h += `<text x="318" y="${y+12}" font-size="11" font-weight="bold" fill="#b45309">= ${d.deg}°</text>`;
    });
    return h;
  }

  const drawUpTo = step==='sec1'?1 : step==='sec2'?2 : 5;
  let startAngle = -Math.PI/2;

  pieData.forEach((d,i)=>{
    if (i>=drawUpTo) { startAngle += (d.deg/360)*2*Math.PI; return; }
    const angle = (d.deg/360)*2*Math.PI;
    const endAngle = startAngle+angle;
    const isHL = i===hl;
    const offset = isHL && step!=='done' ? 10 : 0;
    const midAngle = startAngle+angle/2;
    const ocx = cx+Math.cos(midAngle)*offset;
    const ocy = cy+Math.sin(midAngle)*offset;
    const x1=ocx+r*Math.cos(startAngle), y1=ocy+r*Math.sin(startAngle);
    const x2=ocx+r*Math.cos(endAngle),   y2=ocy+r*Math.sin(endAngle);
    const large = angle>Math.PI?1:0;
    const fill = isHL && step!=='done' ? '#f97316' : d.color;
    h += `<path d="M${ocx},${ocy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${fill}" stroke="white" stroke-width="2"/>`;

    // Label dans secteur
    if (d.deg>=30) {
      const lx=ocx+Math.cos(midAngle)*r*0.65, ly=ocy+Math.sin(midAngle)*r*0.65;
      h += `<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="11" font-weight="bold" text-anchor="middle" fill="white">${d.pct}%</text>`;
    }

    // Arc de construction pour la barre courante
    if (isHL && step!=='done') {
      // Afficher l'angle en degrés
      const ax=cx+Math.cos(midAngle)*(r+18), ay=cy+Math.sin(midAngle)*(r+18);
      h += `<text x="${ax.toFixed(1)}" y="${ay.toFixed(1)}" font-size="12" font-weight="bold" text-anchor="middle" fill="#c2410c">${d.deg}°</text>`;
    }
    startAngle = endAngle;
  });

  // Légende
  pieData.forEach((d,i)=>{
    const ly=30+i*34;
    h += `<rect x="295" y="${ly}" width="14" height="14" fill="${d.color}" rx="2"/>`;
    h += `<text x="315" y="${ly+12}" font-size="11" fill="#374151">${d.label} — ${d.deg}°</text>`;
  });

  if (step==='done') {
    h += `<text x="${cx}" y="${H_SVG-8}" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309">Sports préférés</text>`;
  }
  return h;
}

const H_SVG = 260;

// ============================================================
// CARTÉSIEN
// ============================================================
function drawLine(step, hl) {
  const W=480,H=H_SVG,padL=44,padB=40,padT=20,padR=14;
  const chartW=W-padL-padR, chartH=H-padB-padT;
  const maxVal=25, n=lineData.length;
  const xStep=chartW/(n-1);
  let h='';

  // Axes
  h += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#374151" stroke-width="2.5"/>`;
  h += `<line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#374151" stroke-width="2.5"/>`;
  h += `<polygon points="${padL},${padT-2} ${padL-4},${padT+10} ${padL+4},${padT+10}" fill="#374151"/>`;
  h += `<polygon points="${W-padR+2},${padT+chartH} ${W-padR-10},${padT+chartH-4} ${W-padR-10},${padT+chartH+4}" fill="#374151"/>`;
  h += `<text x="${padL-36}" y="${padT+chartH/2}" font-size="10" fill="#6b7280" transform="rotate(-90,${padL-36},${padT+chartH/2})" text-anchor="middle">Temp (°C)</text>`;
  if (step==='axes') return h;

  // Grille et graduation
  for (let v=0;v<=maxVal;v+=5) {
    const y=padT+chartH-(v/maxVal)*chartH;
    h += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1"/>`;
    h += `<text x="${padL-5}" y="${(y+4).toFixed(1)}" font-size="11" text-anchor="end" fill="#6b7280">${v}</text>`;
  }
  // Labels mois
  lineData.forEach((d,i)=>{
    const x=padL+i*xStep;
    h += `<text x="${x.toFixed(1)}" y="${(padT+chartH+14).toFixed(1)}" font-size="11" text-anchor="middle" fill="#374151">${d.label}</text>`;
    // Petite graduation verticale
    h += `<line x1="${x.toFixed(1)}" y1="${padT+chartH}" x2="${x.toFixed(1)}" y2="${padT+chartH+5}" stroke="#374151" stroke-width="1.5"/>`;
  });
  if (step==='grille') return h;

  // Points progressifs
  const pts = lineData.map((d,i)=>({x:padL+i*xStep, y:padT+chartH-(d.val/maxVal)*chartH}));
  const drawUpTo = step==='pt1'?1 : step==='pt234'?4 : 6;

  // Zone sous courbe (étape done uniquement)
  if (step==='done'||step==='line') {
    const area = `M${pts[0].x},${padT+chartH} `+pts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+` L${pts[n-1].x},${padT+chartH} Z`;
    h += `<path d="${area}" fill="rgba(109,40,217,0.08)"/>`;
  }

  // Segments reliant les points (étape line et done)
  if (step==='line'||step==='done') {
    const lp = pts.map((p,i)=>(i===0?`M`:`L`)+`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    h += `<path d="${lp}" fill="none" stroke="#6d28d9" stroke-width="2.5"/>`;
  }

  // Points
  for (let i=0;i<drawUpTo;i++) {
    const d=lineData[i], p=pts[i];
    const isHL = i===hl;
    const fill = isHL ? '#f97316' : step==='done'||step==='line' ? '#6d28d9' : '#6d28d9';
    const rr = isHL ? 7 : 5;
    h += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${rr}" fill="${fill}" stroke="white" stroke-width="2"/>`;
    if (isHL || step==='done') {
      h += `<text x="${(p.x+7).toFixed(1)}" y="${(p.y-7).toFixed(1)}" font-size="11" font-weight="bold" fill="${isHL?'#c2410c':'#4c1d95'}">${d.val}°</text>`;
    }
    // Lignes de construction pour le point en cours
    if (isHL) {
      h += `<line x1="${padL}" y1="${p.y.toFixed(1)}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      h += `<line x1="${p.x.toFixed(1)}" y1="${p.y.toFixed(1)}" x2="${p.x.toFixed(1)}" y2="${padT+chartH}" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      h += `<circle cx="${padL}" cy="${p.y.toFixed(1)}" r="4" fill="#f97316"/>`;
      h += `<circle cx="${p.x.toFixed(1)}" cy="${padT+chartH}" r="4" fill="#f97316"/>`;
    }
  }

  if (step==='done') {
    h += `<text x="${padL+chartW/2}" y="15" font-size="12" font-weight="bold" text-anchor="middle" fill="#6d28d9">Températures mensuelles</text>`;
  }
  return h;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const etapesArr=[barEtapes,pieEtapes,lineEtapes][mode];
  const e=etapesArr[etape];
  const cols=['#0f766e','#b45309','#6d28d9'];
  const col=cols[mode];

  // Table de données avec surbrillance
  renderDataTable(e.hl, col);

  let svg='';
  if (mode===0) svg=drawBars(e.step, e.hl);
  else if (mode===1) svg=drawPie(e.step, e.hl);
  else svg=drawLine(e.step, e.hl);
  document.getElementById('diag').innerHTML=svg;

  document.getElementById('explication').textContent=e.text;
  document.getElementById('etape-ind').textContent=`Étape ${etape+1} / ${etapesArr.length}`;
}

render();
</script>
</body>
</html>
