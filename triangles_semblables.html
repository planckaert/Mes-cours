<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangles semblables</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fdf4ff; min-height: 100vh; }
  h1 { text-align: center; padding: 14px; background: #4c1d95; color: white; font-size: 1.2em; }
  .tabs { display: flex; justify-content: center; gap: 8px; padding: 10px 8px; flex-wrap: wrap; }
  .tab { padding: 9px 18px; border-radius: 20px; border: none; font-size: 0.82em; cursor: pointer; font-weight: bold; transition: all 0.2s; }
  .tab1 { background: #ede9fe; color: #4c1d95; border: 2px solid #c4b5fd; }
  .tab2 { background: #fef3c7; color: #78350f; border: 2px solid #fcd34d; }
  .tab1.active { background: #6d28d9; color: white; border-color: #6d28d9; }
  .tab2.active { background: #b45309; color: white; border-color: #b45309; }

  .scene { display: flex; flex-direction: column; align-items: center; padding: 8px; }
  svg#fig { width: 100%; max-width: 480px; height: 290px; background: white; border-radius: 14px; box-shadow: 0 2px 10px #0002; display: block; }

  .calc-box { background: white; border-radius: 14px; padding: 13px 18px; margin: 6px auto; max-width: 480px; width: 95%; box-shadow: 0 2px 8px #0002; border-left: 5px solid #6d28d9; font-size: 0.97em; line-height: 2.1; }
  .enonce { font-weight: bold; border-radius: 8px; padding: 6px 12px; margin-bottom: 8px; font-size: 0.92em; }
  .en1 { background: #ede9fe; color: #4c1d95; }
  .en2 { background: #fef3c7; color: #78350f; }
  .ligne { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 2px 0; }
  .hl-v { color: #6d28d9; font-weight: bold; }
  .hl-r { color: #dc2626; font-weight: bold; }
  .hl-b { color: #1d4ed8; font-weight: bold; }
  .hl-g { color: #15803d; font-weight: bold; }
  .hl-o { color: #b45309; font-weight: bold; }
  .fr { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 3px; line-height: 1.2; }
  .fr .n { border-bottom: 2px solid currentColor; padding: 0 5px; font-size: 0.95em; }
  .fr .d { padding: 0 5px; font-size: 0.95em; }
  .conclusion-ok { background: #dcfce7; border-left: 4px solid #22c55e; padding: 7px 14px; border-radius: 8px; font-weight: bold; color: #14532d; margin-top: 6px; }
  .attention { background: #fff7ed; border-left: 4px solid #f97316; padding: 6px 12px; border-radius: 7px; margin-top: 6px; color: #7c2d12; font-size: 0.91em; }

  .explication { background: white; border-radius: 14px; padding: 10px 16px; margin: 6px auto; max-width: 480px; width: 95%; font-size: 0.95em; color: #333; box-shadow: 0 2px 8px #0001; border-left: 5px solid #ccc; }
  .etape-ind { text-align: center; color: #999; font-size: 0.86em; margin-bottom: 3px; }
  .btns { display: flex; gap: 12px; justify-content: center; margin: 8px; }
  button.nav { padding: 10px 28px; border-radius: 22px; border: none; font-size: 1em; cursor: pointer; font-weight: bold; }
  .btn-prev { background: #e9ecef; color: #555; }
  .btn-next { background: #6d28d9; color: white; }
</style>
</head>
<body>
<h1>📐 Triangles semblables</h1>
<div class="tabs">
  <button class="tab tab1 active" onclick="setMode(0)">Définition &amp; propriétés</button>
  <button class="tab tab2" onclick="setMode(1)">Calculer un côté inconnu</button>
</div>
<div class="scene">
  <svg id="fig" viewBox="0 0 480 290"></svg>
  <div class="calc-box" id="calc-box"></div>
  <div class="explication" id="explication"></div>
  <div class="etape-ind" id="etape-ind"></div>
  <div class="btns">
    <button class="nav btn-prev" onclick="prev()">◀ Précédent</button>
    <button class="nav btn-next" onclick="next()">Suivant ▶</button>
  </div>
</div>

<script>
var mode=0, etape=0;
var COLS=['#6d28d9','#b45309'];

// ─── Helpers SVG ───────────────────────────────────────────
function T(x,y,s,col,sz,anc,bold){
  sz=sz||12; anc=anc||'middle'; bold=bold||false;
  return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" text-anchor="'+anc
    +'" fill="'+col+'" font-weight="'+(bold?'bold':'normal')
    +'" font-family="Segoe UI,sans-serif">'+s+'</text>';
}
function R(x,y,w,h,rx,fill,stroke,sw){
  stroke=stroke||'none'; sw=sw||1;
  return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h
    +'" rx="'+rx+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';
}
function L(x1,y1,x2,y2,col,w,dash){
  w=w||2; dash=dash||'';
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2
    +'" stroke="'+col+'" stroke-width="'+w+'" stroke-dasharray="'+dash+'" stroke-linecap="round"/>';
}
function Pt(x,y,col){ return '<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="'+col+'" stroke="white" stroke-width="1.5"/>'; }

// Arc d'angle en un sommet (indique l'angle)
function arcAngle(px,py, ax,ay, bx,by, r, col, dash){
  dash=dash||'';
  var a1=Math.atan2(ay-py,ax-px);
  var a2=Math.atan2(by-py,bx-px);
  // normalise a2 > a1
  if(a2<a1) a2+=2*Math.PI;
  var x1=px+r*Math.cos(a1), y1=py+r*Math.sin(a1);
  var x2=px+r*Math.cos(a2), y2=py+r*Math.sin(a2);
  var large=(a2-a1>Math.PI)?1:0;
  return '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+'"'
    +' fill="none" stroke="'+col+'" stroke-width="2" stroke-dasharray="'+dash+'" stroke-linecap="round"/>';
}

// Double arc (2ème marque d'angle)
function arcAngle2(px,py,ax,ay,bx,by,r,col){
  return arcAngle(px,py,ax,ay,bx,by,r,col)
        +arcAngle(px,py,ax,ay,bx,by,r+5,col);
}

// Marque triple arc (3ème)
function arcAngle3(px,py,ax,ay,bx,by,r,col){
  return arcAngle(px,py,ax,ay,bx,by,r,col)
        +arcAngle(px,py,ax,ay,bx,by,r+5,col)
        +arcAngle(px,py,ax,ay,bx,by,r+10,col);
}

// Tiret de milieu (marque les côtés homologues)
function marqueCote(ax,ay,bx,by,n,col){
  var mx=(ax+bx)/2, my=(ay+by)/2;
  var dx=bx-ax, dy=by-ay, len=Math.sqrt(dx*dx+dy*dy);
  var nx=-dy/len*6, ny=dx/len*6;
  var h='';
  for(var i=0;i<n;i++){
    var off=(i-(n-1)/2)*5;
    var ux=dx/len, uy=dy/len;
    h+=L(mx+ux*off-nx,my+uy*off-ny, mx+ux*off+nx,my+uy*off+ny, col,2);
  }
  return h;
}

// Étiquette centrée sur un côté (milieu + décalage perpendiculaire)
function lblCote(ax,ay,bx,by,lbl,col,offset){
  offset=offset||14;
  var mx=(ax+bx)/2, my=(ay+by)/2;
  var dx=bx-ax, dy=by-ay, len=Math.sqrt(dx*dx+dy*dy);
  var nx=-dy/len, ny=dx/len;
  return T(mx+nx*offset, my+ny*offset, lbl, col, 11, 'middle', true);
}

// ─── Triangles de référence ─────────────────────────────
// Grand triangle ABC (référence)
// A en bas-gauche, B en bas-droite, C en haut
// Angles : A=50°, B=70°, C=60°
// On fixe AB = 120, on calcule les autres côtés par la loi des sinus
var scale1 = 1.0;
var AB1 = 120;
// loi des sinus : a/sin(A) = b/sin(B) = c/sin(C)
// a = BC, b = AC, c = AB
var angA1=50*Math.PI/180, angB1=70*Math.PI/180, angC1=60*Math.PI/180;
var k1 = AB1/Math.sin(angC1);
var BC1 = k1*Math.sin(angA1); // côté opposé à A
var AC1 = k1*Math.sin(angB1); // côté opposé à B

// Coordonnées triangle 1
var A1={x:60, y:240};
var B1={x:A1.x+AB1, y:240};
// C1 en haut : on place depuis A1 avec l'angle en A
var C1={x:A1.x+AC1*Math.cos(angA1*0+0), y:0}; // simplifié ci-dessous

// Calcul propre de C1
// angle en A1 par rapport à horizontale : angA1 depuis A vers B direction
// on place C1 à partir de A1 sur direction de l'angle A
var dirAB={x:1,y:0}; // AB horizontal
// Angle A = 50° → C est à 50° au-dessus de AB depuis A
C1={x:A1.x+AC1*Math.cos(angA1), y:A1.y-AC1*Math.sin(angA1)};

// Petit triangle A'B'C' semblable, rapport k=0.55
var k=0.55;
var A2={x:290, y:240};
var B2={x:A2.x+AB1*k, y:240};
var C2={x:A2.x+AC1*k*Math.cos(angA1), y:A2.y-AC1*k*Math.sin(angA1)};

// Longueurs arrondies pour affichage
var ab1=AB1, bc1=Math.round(BC1), ac1=Math.round(AC1);
var ab2=Math.round(AB1*k), bc2=Math.round(BC1*k), ac2=Math.round(AC1*k);

// ════════════════════════════════════════════════════════════
// ONGLET 0 — DÉFINITION & PROPRIÉTÉS
// ════════════════════════════════════════════════════════════
var e0=[

  // Étape 1 : définition — angles égaux
  {
    explic:"Deux triangles sont semblables si leurs angles sont égaux deux à deux (même mesure). On dit que les sommets correspondants sont les sommets homologues. Ici ABC et A'B'C' sont semblables.",
    draw:function(){
      var h='';
      h+=T(240,18,'Triangles semblables — Définition','#4c1d95',13,'middle',true);
      h+=T(240,34,'Deux triangles ont leurs angles égaux deux à deux','#374151',10);

      // Triangle 1 — grand
      h+=L(A1.x,A1.y,B1.x,B1.y,'#6d28d9',2.5);
      h+=L(B1.x,B1.y,C1.x,C1.y,'#6d28d9',2.5);
      h+=L(A1.x,A1.y,C1.x,C1.y,'#6d28d9',2.5);
      h+=Pt(A1.x,A1.y,'#6d28d9'); h+=T(A1.x-12,A1.y+4,'A','#6d28d9',12,'middle',true);
      h+=Pt(B1.x,B1.y,'#6d28d9'); h+=T(B1.x+12,B1.y+4,'B','#6d28d9',12,'middle',true);
      h+=Pt(C1.x,C1.y,'#6d28d9'); h+=T(C1.x,C1.y-10,'C','#6d28d9',12,'middle',true);

      // Triangle 2 — petit
      h+=L(A2.x,A2.y,B2.x,B2.y,'#b45309',2.5);
      h+=L(B2.x,B2.y,C2.x,C2.y,'#b45309',2.5);
      h+=L(A2.x,A2.y,C2.x,C2.y,'#b45309',2.5);
      h+=Pt(A2.x,A2.y,'#b45309'); h+=T(A2.x-12,A2.y+4,"A'",'#b45309',12,'middle',true);
      h+=Pt(B2.x,B2.y,'#b45309'); h+=T(B2.x+14,B2.y+4,"B'",'#b45309',12,'middle',true);
      h+=Pt(C2.x,C2.y,'#b45309'); h+=T(C2.x,C2.y-10,"C'",'#b45309',12,'middle',true);

      // Marques d'angles : A=A' (1 arc rouge), B=B' (2 arcs bleus), C=C' (3 arcs verts)
      // Angle A (50°) — 1 arc
      h+=arcAngle(A1.x,A1.y, B1.x,B1.y, C1.x,C1.y, 20,'#dc2626');
      h+=arcAngle(A2.x,A2.y, B2.x,B2.y, C2.x,C2.y, 20,'#dc2626');
      h+=T(A1.x+26,A1.y-14,'50°','#dc2626',9,'middle');
      h+=T(A2.x+16,A2.y-10,'50°','#dc2626',9,'middle');

      // Angle B (70°) — 2 arcs
      h+=arcAngle2(B1.x,B1.y, A1.x,A1.y, C1.x,C1.y, 20,'#1d4ed8');
      h+=arcAngle2(B2.x,B2.y, A2.x,A2.y, C2.x,C2.y, 20,'#1d4ed8');
      h+=T(B1.x-28,B1.y-18,'70°','#1d4ed8',9,'middle');
      h+=T(B2.x-18,B2.y-14,'70°','#1d4ed8',9,'middle');

      // Angle C (60°) — 3 arcs
      h+=arcAngle3(C1.x,C1.y, A1.x,A1.y, B1.x,B1.y, 18,'#15803d');
      h+=arcAngle3(C2.x,C2.y, A2.x,A2.y, B2.x,B2.y, 18,'#15803d');
      h+=T(C1.x+24,C1.y+18,'60°','#15803d',9,'middle');
      h+=T(C2.x+16,C2.y+14,'60°','#15803d',9,'middle');

      // Bandeau définition
      h+=R(10,260,460,25,6,'#ede9fe','#c4b5fd',2);
      h+=T(240,276,'ABC et A\'B\'C\' sont semblables car leurs angles sont égaux deux à deux.','#4c1d95',10,'middle',true);
      return h;
    },
    calc:'<div class="enonce en1">Définition : Triangles semblables</div>'
      +'<div class="ligne">Deux triangles sont <span class="hl-v">semblables</span> si leurs angles sont égaux deux à deux.</div>'
      +'<div class="ligne"><span class="hl-r">Â = Â\'</span> = 50°, <span class="hl-b">B̂ = B̂\'</span> = 70°, <span class="hl-g">Ĉ = Ĉ\'</span> = 60°</div>'
      +'<div class="ligne">Les sommets <span class="hl-v">homologues</span> correspondent : A↔A\', B↔B\', C↔C\'</div>'
  },

  // Étape 2 : côtés homologues
  {
    explic:"Dans deux triangles semblables, les côtés situés en face des angles égaux sont appelés côtés homologues. Ils se correspondent : AB et A'B' (en face de C), BC et B'C' (en face de A), AC et A'C' (en face de B).",
    draw:function(){
      var h='';
      h+=T(240,18,'Côtés homologues','#4c1d95',13,'middle',true);

      // Triangle 1
      h+=L(A1.x,A1.y,B1.x,B1.y,'#dc2626',2.5);   // AB — rouge
      h+=L(B1.x,B1.y,C1.x,C1.y,'#1d4ed8',2.5);   // BC — bleu
      h+=L(A1.x,A1.y,C1.x,C1.y,'#15803d',2.5);   // AC — vert
      h+=Pt(A1.x,A1.y,'#6d28d9'); h+=T(A1.x-12,A1.y+4,'A','#6d28d9',12,'middle',true);
      h+=Pt(B1.x,B1.y,'#6d28d9'); h+=T(B1.x+12,B1.y+4,'B','#6d28d9',12,'middle',true);
      h+=Pt(C1.x,C1.y,'#6d28d9'); h+=T(C1.x,C1.y-10,'C','#6d28d9',12,'middle',true);

      // Triangle 2
      h+=L(A2.x,A2.y,B2.x,B2.y,'#dc2626',2.5);
      h+=L(B2.x,B2.y,C2.x,C2.y,'#1d4ed8',2.5);
      h+=L(A2.x,A2.y,C2.x,C2.y,'#15803d',2.5);
      h+=Pt(A2.x,A2.y,'#b45309'); h+=T(A2.x-12,A2.y+4,"A'",'#b45309',12,'middle',true);
      h+=Pt(B2.x,B2.y,'#b45309'); h+=T(B2.x+14,B2.y+4,"B'",'#b45309',12,'middle',true);
      h+=Pt(C2.x,C2.y,'#b45309'); h+=T(C2.x,C2.y-10,"C'",'#b45309',12,'middle',true);

      // Marques de côtés homologues
      h+=marqueCote(A1.x,A1.y,B1.x,B1.y,1,'#dc2626');
      h+=marqueCote(A2.x,A2.y,B2.x,B2.y,1,'#dc2626');
      h+=marqueCote(B1.x,B1.y,C1.x,C1.y,2,'#1d4ed8');
      h+=marqueCote(B2.x,B2.y,C2.x,C2.y,2,'#1d4ed8');
      h+=marqueCote(A1.x,A1.y,C1.x,C1.y,3,'#15803d');
      h+=marqueCote(A2.x,A2.y,C2.x,C2.y,3,'#15803d');

      // Étiquettes côtés
      h+=lblCote(A1.x,A1.y,B1.x,B1.y,'AB','#dc2626',-12);
      h+=lblCote(A2.x,A2.y,B2.x,B2.y,"A'B'",'#dc2626',-12);
      h+=lblCote(B1.x,B1.y,C1.x,C1.y,'BC','#1d4ed8',12);
      h+=lblCote(B2.x,B2.y,C2.x,C2.y,"B'C'",'#1d4ed8',10);
      h+=lblCote(A1.x,A1.y,C1.x,C1.y,'AC','#15803d',-12);
      h+=lblCote(A2.x,A2.y,C2.x,C2.y,"A'C'",'#15803d',-10);

      // Bandeau
      h+=R(10,262,460,24,6,'#ede9fe','#c4b5fd',2);
      h+=T(240,278,'Même couleur = côtés homologues (ils se font face aux angles égaux).','#4c1d95',10,'middle',true);
      return h;
    },
    calc:'<div class="enonce en1">Côtés homologues</div>'
      +'<div class="ligne">Les côtés <span class="hl-v">homologues</span> sont en face des angles égaux :</div>'
      +'<div class="ligne"><span class="hl-r">AB</span> et <span class="hl-r">A\'B\'</span> (en face de Ĉ = 60°)</div>'
      +'<div class="ligne"><span class="hl-b">BC</span> et <span class="hl-b">B\'C\'</span> (en face de Â = 50°)</div>'
      +'<div class="ligne"><span class="hl-g">AC</span> et <span class="hl-g">A\'C\'</span> (en face de B̂ = 70°)</div>'
  },

  // Étape 3 : proportionnalité des côtés — rapport de similitude
  {
    explic:"Dans deux triangles semblables, les côtés homologues sont proportionnels : leur rapport est toujours le même. Ce rapport constant s'appelle le rapport de similitude k.",
    draw:function(){
      var h='';
      h+=T(240,18,'Rapport de similitude','#4c1d95',13,'middle',true);

      // Triangles avec mesures
      h+=L(A1.x,A1.y,B1.x,B1.y,'#dc2626',2.5);
      h+=L(B1.x,B1.y,C1.x,C1.y,'#1d4ed8',2.5);
      h+=L(A1.x,A1.y,C1.x,C1.y,'#15803d',2.5);
      h+=Pt(A1.x,A1.y,'#6d28d9'); h+=T(A1.x-12,A1.y+4,'A','#6d28d9',12,'middle',true);
      h+=Pt(B1.x,B1.y,'#6d28d9'); h+=T(B1.x+12,B1.y+4,'B','#6d28d9',12,'middle',true);
      h+=Pt(C1.x,C1.y,'#6d28d9'); h+=T(C1.x,C1.y-10,'C','#6d28d9',12,'middle',true);

      h+=L(A2.x,A2.y,B2.x,B2.y,'#dc2626',2.5);
      h+=L(B2.x,B2.y,C2.x,C2.y,'#1d4ed8',2.5);
      h+=L(A2.x,A2.y,C2.x,C2.y,'#15803d',2.5);
      h+=Pt(A2.x,A2.y,'#b45309'); h+=T(A2.x-12,A2.y+4,"A'",'#b45309',12,'middle',true);
      h+=Pt(B2.x,B2.y,'#b45309'); h+=T(B2.x+14,B2.y+4,"B'",'#b45309',12,'middle',true);
      h+=Pt(C2.x,C2.y,'#b45309'); h+=T(C2.x,C2.y-10,"C'",'#b45309',12,'middle',true);

      // Mesures côtés
      h+=lblCote(A1.x,A1.y,B1.x,B1.y,ab1+' cm','#dc2626',-13);
      h+=lblCote(B1.x,B1.y,C1.x,C1.y,bc1+' cm','#1d4ed8',13);
      h+=lblCote(A1.x,A1.y,C1.x,C1.y,ac1+' cm','#15803d',-13);
      h+=lblCote(A2.x,A2.y,B2.x,B2.y,ab2+' cm','#dc2626',-11);
      h+=lblCote(B2.x,B2.y,C2.x,C2.y,bc2+' cm','#1d4ed8',11);
      h+=lblCote(A2.x,A2.y,C2.x,C2.y,ac2+' cm','#15803d',-11);

      // Bandeau rapport
      h+=R(10,228,460,58,10,'#4c1d95');
      h+=T(240,246,'Rapport de similitude :','white',11,'middle',true);
      // Fractions
      var fx=75;
      h+=T(fx,258,"A'B'",'#f87171',11,'middle',true);
      h+=L(fx-20,262,fx+20,262,'white',1);
      h+=T(fx,274,'AB','#f87171',11,'middle',true);
      h+=T(fx+30,265,'=','white',12,'middle');
      h+=T(fx+55,258,ab2,'#fca5a5',12,'middle',true);
      h+=L(fx+38,262,fx+72,262,'white',1);
      h+=T(fx+55,274,ab1,'#fca5a5',12,'middle',true);

      var fx2=185;
      h+=T(fx2,258,"B'C'",'#93c5fd',11,'middle',true);
      h+=L(fx2-20,262,fx2+20,262,'white',1);
      h+=T(fx2,274,'BC','#93c5fd',11,'middle',true);
      h+=T(fx2+30,265,'=','white',12,'middle');
      h+=T(fx2+55,258,bc2,'#bfdbfe',12,'middle',true);
      h+=L(fx2+38,262,fx2+72,262,'white',1);
      h+=T(fx2+55,274,bc1,'#bfdbfe',12,'middle',true);

      var fx3=305;
