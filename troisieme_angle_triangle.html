<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troisième angle d'un triangle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f9ff; min-height: 100vh; }
  h1 { text-align: center; padding: 15px; background: #0c4a6e; color: white; font-size: 1.3em; }
  .scene { display: flex; flex-direction: column; align-items: center; padding: 12px; }
  svg#canvas { width: 100%; max-width: 480px; height: 260px; background: white; border-radius: 14px; box-shadow: 0 2px 10px #0002; display: block; }

  /* CALCUL */
  .calcul-box { background: white; border-radius: 14px; padding: 14px 20px; margin: 10px auto; max-width: 460px; width: 95%; box-shadow: 0 2px 8px #0002; border-left: 5px solid #0c4a6e; font-size: 1em; line-height: 1.8; }
  .calcul-box .regle { font-weight: bold; color: #0c4a6e; font-size: 1em; background: #e0f2fe; border-radius: 8px; padding: 6px 12px; margin-bottom: 8px; text-align: center; }
  .calcul-box .etape-calc { margin: 3px 0; }
  .hl-blue  { color: #1d4ed8; font-weight: bold; }
  .hl-green { color: #15803d; font-weight: bold; }
  .hl-orange{ color: #b45309; font-weight: bold; }
  .hl-red   { color: #be185d; font-weight: bold; }

  /* RÉDACTION */
  .redac-box { background: #f0fdf4; border: 2px solid #86efac; border-radius: 12px; padding: 12px 16px; margin: 6px auto; max-width: 460px; width: 95%; font-size: 0.95em; line-height: 1.7; }
  .redac-box .titre { font-weight: bold; color: #14532d; margin-bottom: 6px; }
  .redac-box .conclusion { background: #dcfce7; border-left: 4px solid #22c55e; padding: 6px 10px; border-radius: 6px; font-weight: bold; color: #14532d; margin-top: 8px; }

  .explication { background: white; border-radius: 14px; padding: 11px 16px; margin: 6px auto; max-width: 460px; width: 95%; font-size: 0.96em; color: #222; box-shadow: 0 2px 8px #0001; border-left: 5px solid #0c4a6e; min-height: 46px; }
  .etape-ind { text-align: center; color: #999; font-size: 0.88em; margin-bottom: 3px; }
  .btns { display: flex; gap: 12px; justify-content: center; margin: 8px; }
  button.nav { padding: 10px 28px; border-radius: 22px; border: none; font-size: 1em; cursor: pointer; font-weight: bold; }
  .btn-prev { background: #e9ecef; color: #555; }
  .btn-next { background: #0c4a6e; color: white; }
</style>
</head>
<body>
<h1>📐 Calculer le troisième angle d'un triangle</h1>
<div class="scene">
  <svg id="canvas" viewBox="0 0 480 260"></svg>
  <div id="calcul-box" class="calcul-box"></div>
  <div id="redac-box" class="redac-box" style="display:none"></div>
  <div class="explication" id="explication"></div>
  <div class="etape-ind" id="etape-ind"></div>
  <div class="btns">
    <button class="nav btn-prev" onclick="prev()">◀ Précédent</button>
    <button class="nav btn-next" onclick="next()">Suivant ▶</button>
  </div>
</div>

<script>
let etape = 0;

// Triangle : angle A=55°, angle B=70°, angle C=?
const A = { x: 80,  y: 220, l: 'A', angle: 55  };
const B = { x: 360, y: 220, l: 'B', angle: 70  };
const C = { x: 195, y: 55,  l: 'C', angle: null };
const angleC = 180 - 55 - 70; // = 55°

const etapes = [
  {
    text: "Voici un triangle ABC. On connaît deux angles : angle A = 55° et angle B = 70°. On cherche la mesure de l'angle C.",
    showA: true, showB: true, showC: false,
    calcul: `<div class="regle">📏 Propriété : la somme des angles d'un triangle est toujours 180°.</div>
             <div class="etape-calc">angle A + angle B + angle C = <span class="hl-blue">180°</span></div>`,
    redac: false
  },
  {
    text: "On connaît angle A = 55° et angle B = 70°. On commence par calculer leur somme.",
    showA: true, showB: true, showC: false,
    calcul: `<div class="regle">📏 angle A + angle B + angle C = 180°</div>
             <div class="etape-calc"><span class="hl-blue">55°</span> + <span class="hl-green">70°</span> + angle C = 180°</div>
             <div class="etape-calc"><span class="hl-orange">125°</span> + angle C = 180°</div>`,
    redac: false
  },
  {
    text: "Pour isoler angle C, on soustrait 125° des deux côtés de l'égalité.",
    showA: true, showB: true, showC: false,
    calcul: `<div class="regle">📏 angle A + angle B + angle C = 180°</div>
             <div class="etape-calc"><span class="hl-orange">125°</span> + angle C = 180°</div>
             <div class="etape-calc">angle C = 180° − <span class="hl-orange">125°</span></div>
             <div class="etape-calc">angle C = <span class="hl-red">55°</span></div>`,
    redac: false
  },
  {
    text: "✅ L'angle C mesure 55°. Vérifions : 55° + 70° + 55° = 180° ✓",
    showA: true, showB: true, showC: true,
    calcul: `<div class="regle">📏 angle A + angle B + angle C = 180°</div>
             <div class="etape-calc"><span class="hl-blue">55°</span> + <span class="hl-green">70°</span> + <span class="hl-red">55°</span> = <span class="hl-blue">180° ✓</span></div>`,
    redac: true
  },
];

function prev() { if (etape > 0) { etape--; render(); } }
function next() { if (etape < etapes.length - 1) { etape++; render(); } }

function drawAngleArc(svg, pts, vIdx, angleDeg, color, label, shown) {
  if (!shown) return '';
  const vx = pts[vIdx].x, vy = pts[vIdx].y;
  const p1 = pts[(vIdx+1)%3], p2 = pts[(vIdx+2)%3];
  const a1 = Math.atan2(p1.y-vy, p1.x-vx);
  const a2 = Math.atan2(p2.y-vy, p2.x-vx);
  const r = 28;
  const x1 = vx+r*Math.cos(a1), y1 = vy+r*Math.sin(a1);
  const x2 = vx+r*Math.cos(a2), y2 = vy+r*Math.sin(a2);
  // Choisir le bon sens (toujours l'intérieur du triangle)
  const sweep = ((a2-a1+2*Math.PI)%(2*Math.PI)) < Math.PI ? 0 : 1;
  let h = `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 0,${sweep} ${x2.toFixed(1)},${y2.toFixed(1)}" fill="${color}33" stroke="${color}" stroke-width="2"/>`;
  // Label
  const midA = (a1+a2)/2 + (sweep===1 ? Math.PI : 0);
  // Ajuster pour que le label soit bien à l'intérieur
  const lx = vx + Math.cos((a1+a2)/2) * (r+20);
  const ly = vy + Math.sin((a1+a2)/2) * (r+20);
  h += `<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="14" font-weight="bold" text-anchor="middle" fill="${color}">${label}</text>`;
  return h;
}

function render() {
  const e = etapes[etape];
  const pts = [A, B, C];
  let h = '';

  // Triangle
  h += `<polygon points="${pts.map(p=>p.x+','+p.y).join(' ')}" fill="rgba(12,74,110,0.08)" stroke="#0c4a6e" stroke-width="2.5"/>`;

  // Arcs d'angles
  h += drawAngleArc(null, pts, 0, A.angle, '#1d4ed8', e.showA ? '55°' : '', e.showA);
  h += drawAngleArc(null, pts, 1, B.angle, '#15803d', e.showB ? '70°' : '', e.showB);
  h += drawAngleArc(null, pts, 2, angleC,  '#be185d', e.showC ? '55°' : '?',   e.showB || e.showA);

  // Point d'interrogation animé sur C si pas encore trouvé
  if (!e.showC) {
    h += `<text x="${C.x}" y="${C.y - 36}" font-size="22" font-weight="bold" text-anchor="middle" fill="#94a3b8">?</text>`;
  }

  // Sommets
  pts.forEach(p => {
    h += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="#0c4a6e" stroke="white" stroke-width="2"/>`;
    const ox = p.x < 200 ? -18 : p.x > 300 ? 10 : -8;
    const oy = p.y > 200 ? 18 : -10;
    h += `<text x="${p.x+ox}" y="${p.y+oy}" font-size="15" font-weight="bold" fill="#0c4a6e">${p.l}</text>`;
  });

  // Étiquette de la propriété sur le triangle (étape 0)
  if (etape === 0) {
    h += `<text x="220" y="155" font-size="12" text-anchor="middle" fill="#0369a1" font-style="italic">A + B + C = 180°</text>`;
  }

  document.getElementById('canvas').innerHTML = h;
  document.getElementById('calcul-box').innerHTML = e.calcul;

  // Rédaction
  const rb = document.getElementById('redac-box');
  if (e.redac) {
    rb.style.display = 'block';
    rb.innerHTML = `<div class="titre">✍️ Rédaction</div>
      <div>La somme des angles d'un triangle est égale à 180°, donc :</div>
      <div style="margin:4px 0"><span class="hl-blue">angle A</span> + <span class="hl-green">angle B</span> + <span class="hl-red">angle C</span> = 180°</div>
      <div style="margin:4px 0"><span class="hl-blue">55°</span> + <span class="hl-green">70°</span> + <span class="hl-red">angle C</span> = 180°</div>
      <div style="margin:4px 0"><span class="hl-red">angle C</span> = 180° − 55° − 70°</div>
      <div class="conclusion">angle C = 55°</div>`;
  } else {
    rb.style.display = 'none';
  }

  document.getElementById('explication').textContent = e.text;
  document.getElementById('etape-ind').textContent = `Étape ${etape+1} / ${etapes.length}`;
}

render();
</script>
</body>
</html>
