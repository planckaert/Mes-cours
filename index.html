<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MesCours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0C0C10;--surface:#14141C;--surface2:#1C1C26;
      --border:rgba(255,255,255,0.06);--text:rgba(255,255,255,0.9);
      --muted:rgba(255,255,255,0.3);--faint:rgba(255,255,255,0.07);
    }
    html,body{height:100%;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);}

    /* ── ÉCRANS ── */
    .screen{display:none;min-height:100vh;}
    .screen.visible{display:flex;}

    /* ── LOGIN ── */
    #screenLogin{
      flex-direction:column;align-items:center;justify-content:center;
      padding:40px 32px;
      background:linear-gradient(160deg,#2d5a4e 0%,#1e3d34 40%,#162e27 100%);
      position:relative;overflow:hidden;
    }
    .login-svg{position:absolute;opacity:0.07;pointer-events:none;}
    .login-svg-tl{top:-40px;left:-40px;width:280px;transform:rotate(-15deg);}
    .login-svg-br{bottom:-60px;right:-60px;width:320px;transform:rotate(20deg);}
    .login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;}
    .app-title{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:white;margin-bottom:6px;text-align:center;}
    .app-sub{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:52px;}
    .field-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:10px;width:100%;max-width:360px;}
    .code-input{
      width:100%;max-width:360px;
      background:var(--surface2);border:1.5px solid var(--border);border-radius:18px;
      padding:20px;color:white;font-family:'Outfit',sans-serif;font-size:24px;font-weight:600;
      letter-spacing:6px;text-transform:uppercase;text-align:center;outline:none;
      transition:border-color .2s,box-shadow .2s;margin-bottom:6px;
    }
    .code-input:focus{border-color:rgba(99,179,237,0.5);box-shadow:0 0 0 3px rgba(99,179,237,0.08)}
    .code-input::placeholder{color:rgba(255,255,255,0.12);letter-spacing:2px;font-size:14px;font-weight:400}
    .login-hint{font-size:11px;color:rgba(255,255,255,0.18);margin-bottom:28px;text-align:center}
    .login-btn{
      width:100%;max-width:360px;border:none;border-radius:18px;padding:19px;cursor:pointer;
      font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:white;
      background:linear-gradient(135deg,#63B3ED,#4299E1);
      box-shadow:0 8px 32px rgba(66,153,225,.3);
      transition:transform .15s,box-shadow .15s;
    }
    .login-btn:active{transform:scale(.98)}
    .err{font-size:12px;color:#FF6B6B;text-align:center;margin:8px 0;min-height:20px;}

    /* ── GROUPE ── */
    #screenGroupe{
      flex-direction:column;align-items:center;justify-content:center;
      padding:40px 32px;
      background:linear-gradient(160deg,#2d5a4e 0%,#1e3d34 40%,#162e27 100%);
    }
    .groupe-titre{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:white;text-align:center;margin-bottom:8px;}
    .groupe-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:48px;}
    .groupe-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;}
    .groupe-btn{
      padding:18px;border-radius:16px;border:1.5px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);color:white;
      font-family:'Outfit',sans-serif;font-size:17px;font-weight:600;cursor:pointer;
      transition:background .2s;
    }
    .groupe-btn:active{background:rgba(255,255,255,0.18);}
    .groupe-retour{margin-top:28px;background:none;border:none;color:rgba(255,255,255,0.2);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;}

    /* ── APP ── */
    #screenApp{
      flex-direction:column;
      position:fixed;top:0;left:0;right:0;bottom:0;
      overflow-y:auto;background:var(--bg);
    }
    .topbar{
      position:sticky;top:0;z-index:10;
      padding:16px 20px 14px;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
    }
    .class-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .class-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;}
    .exit-btn{
      background:none;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);
      border-radius:10px;padding:7px 14px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;
    }

    .tip-banner{
      margin:12px 16px 0;background:rgba(99,179,237,0.05);
      border:1px solid rgba(99,179,237,0.12);border-radius:14px;
      padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
    }
    .tip-text{font-size:11px;color:rgba(99,179,237,0.65);line-height:1.7;}
    .tip-text strong{color:rgba(99,179,237,0.9);display:block;margin-bottom:3px;font-size:12px;}
    .tip-close{background:none;border:none;color:rgba(99,179,237,0.3);cursor:pointer;font-size:16px;padding:0;flex-shrink:0;margin-left:auto;}

    #loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.5;padding:60px 0;}
    #loading.visible{display:flex;}
    .spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.5);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .scroll{flex:1;padding:16px 16px 32px;}

    .notion-block{margin-bottom:24px;}
    .notion-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px;}
    .notion-pill{height:2px;flex:1;border-radius:2px;opacity:.4;}
    .notion-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.3px;white-space:nowrap;}

    .file-card{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:13px;
      text-decoration:none;transition:background .15s;
    }
    .file-card:active{background:var(--surface2);}
    .file-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .file-body{flex:1;min-width:0;}
    .file-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .type-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.3px;border-radius:6px;padding:2px 8px;}
    .badge-actif{font-size:9px;font-weight:700;letter-spacing:.5px;border-radius:5px;padding:2px 7px;}
    .arrow{color:rgba(255,255,255,.2);font-size:18px;flex-shrink:0;}

    .ai-mention{text-align:center;padding:8px 16px 28px;font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:.3px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp .3s ease forwards;}
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="screenLogin" class="screen visible">
  <svg class="login-svg login-svg-tl" viewBox="0 0 200 200" fill="none">
    <line x1="100" y1="10" x2="60" y2="170" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="10" x2="140" y2="170" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="10" r="8" fill="white"/>
    <circle cx="60" cy="170" r="6" fill="white"/>
    <circle cx="140" cy="170" r="6" fill="white"/>
    <path d="M72 120 Q100 108 128 120" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="10" y="80" width="180" height="28" rx="4" stroke="white" stroke-width="3" fill="none"/>
    <line x1="30" y1="80" x2="30" y2="94" stroke="white" stroke-width="2"/>
    <line x1="50" y1="80" x2="50" y2="94" stroke="white" stroke-width="2"/>
    <line x1="70" y1="80" x2="70" y2="94" stroke="white" stroke-width="2"/>
    <line x1="90" y1="80" x2="90" y2="94" stroke="white" stroke-width="2"/>
    <line x1="110" y1="80" x2="110" y2="94" stroke="white" stroke-width="2"/>
    <line x1="130" y1="80" x2="130" y2="94" stroke="white" stroke-width="2"/>
    <line x1="150" y1="80" x2="150" y2="94" stroke="white" stroke-width="2"/>
    <line x1="170" y1="80" x2="170" y2="94" stroke="white" stroke-width="2"/>
  </svg>
  <svg class="login-svg login-svg-br" viewBox="0 0 200 200" fill="none">
    <path d="M20 180 L20 20 L160 180 Z" stroke="white" stroke-width="4" stroke-linejoin="round" fill="none"/>
    <rect x="20" y="155" width="25" height="25" stroke="white" stroke-width="3" fill="none"/>
    <path d="M80 170 A70 70 0 0 1 170 80" stroke="white" stroke-width="3" fill="none" stroke-dasharray="8 5"/>
    <rect x="120" y="20" width="60" height="80" rx="6" stroke="white" stroke-width="3" fill="none"/>
    <rect x="128" y="28" width="44" height="20" rx="3" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="133" cy="62" r="4" fill="white"/>
    <circle cx="150" cy="62" r="4" fill="white"/>
    <circle cx="167" cy="62" r="4" fill="white"/>
    <circle cx="133" cy="78" r="4" fill="white"/>
    <circle cx="150" cy="78" r="4" fill="white"/>
    <circle cx="167" cy="78" r="4" fill="white"/>
  </svg>
  <div class="login-inner">
    <div class="app-title">MesCours</div>
    <div class="app-sub">Collège — Mathématiques</div>
    <div class="field-label">Quelle est de ta classe</div>
    <input class="code-input" id="codeInput" placeholder="ex : 6A" maxlength="8" autocomplete="off"/>
    <div class="login-hint">Nom de ta classe</div>
    <div class="err" id="errMsg"></div>
    <button class="login-btn" onclick="handleLogin()">Accéder à mes cours →</button>
  </div>
</div>

<!-- ── CHOIX GROUPE ── -->
<div id="screenGroupe" class="screen">
  <div class="groupe-titre" id="groupeTitre"></div>
  <div class="groupe-sub">Tu es dans quel groupe ?</div>
  <div class="groupe-btns">
    <button class="groupe-btn" onclick="chargerContenu(null)">Classe entière</button>
    <button class="groupe-btn" onclick="chargerContenu('1')">Groupe 1</button>
    <button class="groupe-btn" onclick="chargerContenu('2')">Groupe 2</button>
  </div>
  <button class="groupe-retour" onclick="afficher('screenLogin')">← Retour</button>
</div>

<!-- ── CONTENU ── -->
<div id="screenApp" class="screen">
  <div class="topbar">
    <div>
      <div class="class-label">Mes cours</div>
      <div class="class-name" id="className"></div>
    </div>
    <button class="exit-btn" onclick="handleLogout()">Déconnexion</button>
  </div>

  <div class="tip-banner" id="tipBanner">
    <span>💡</span>
    <div class="tip-text"><strong>Écran qui s'éteint ?</strong>Paramètres → Écran → Mise en veille → choisir <em>10 minutes</em></div>
    <button class="tip-close" onclick="document.getElementById('tipBanner').style.display='none'">✕</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--muted)">Chargement des cours…</div>
  </div>

  <div class="scroll" id="content"></div>
  <div class="ai-mention">Ce site et son contenu ont été créés à l'aide d'une intelligence artificielle</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7fiAAuqoURIUDOvEVG6xDAMWMT4PqV2C30nM-nMvDZDmIxeCj81dfgiBvhb7VB3AEWFd_1RU_Uhci/pub?gid=";
const CSV  = "&single=true&output=csv";

const CLASSES = {
  "6E7": { nom:"6ème 7", color:"#4ECDC4", url: BASE+"0"+CSV },
  "6E3": { nom:"6ème 3", color:"#FF6B35", url: BASE+"267941310"+CSV },
  "6A":  { nom:"6ème 3", color:"#FF6B35", url: BASE+"267941310"+CSV },
  "6B":  { nom:"6ème 3", color:"#FF6B35", url: BASE+"267941310"+CSV },
  "6C":  { nom:"6ème 7", color:"#4ECDC4", url: BASE+"0"+CSV },
  "6D":  { nom:"6ème 7", color:"#4ECDC4", url: BASE+"0"+CSV },
  "6E":  { nom:"6ème 7", color:"#4ECDC4", url: BASE+"0"+CSV },
  "4C": {
    nom:"4ème C", color:"#f97316", groupes:true,
    urlEntier: BASE+"1019934114"+CSV,
    url1:      BASE+"1900744498"+CSV,
    url2:      BASE+"268080844"+CSV,
  },
  "4D": {
    nom:"4ème D", color:"#a855f7", groupes:true,
    urlEntier: BASE+"2033815126"+CSV,
    url1:      BASE+"204263865"+CSV,
    url2:      BASE+"1374832203"+CSV,
  },
  "3D": {
    nom:"3ème D", color:"#ec4899", groupes:true,
    urlEntier: BASE+"1322291492"+CSV,
    url1:      BASE+"181545306"+CSV,
    url2:      BASE+"1788826413"+CSV,
  },
};

const TYPES = {
  "cours":          { icon:"📄", bg:"rgba(99,179,237,0.12)",  color:"#63B3ED", label:"Cours" },
  "exercices":      { icon:"✏️",  bg:"rgba(154,230,180,0.12)", color:"#68D391", label:"Exercices" },
  "énoncé":         { icon:"📋", bg:"rgba(255,159,67,0.15)",  color:"#FF9F43", label:"Énoncé" },
  "corrigé":        { icon:"✅", bg:"rgba(240,147,251,0.12)", color:"#F093FB", label:"Corrigé" },
  "énoncé+corrigé": { icon:"📑", bg:"rgba(255,200,100,0.12)",color:"#FFC864", label:"Énoncé + Corrigé" },
  "dm":             { icon:"📬", bg:"rgba(255,107,107,0.12)", color:"#FF6B6B", label:"DM" },
  "ds":             { icon:"📝", bg:"rgba(200,150,255,0.12)", color:"#C896FF", label:"DS" },
  "animation":      { icon:"🎬", bg:"rgba(99,230,218,0.12)",  color:"#4ECDC4", label:"Animation" },
};

function typeConfig(t) {
  return TYPES[(t||"").toLowerCase().trim()]
    || { icon:"📎", bg:"rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.5)", label: t };
}

function nettoyerLien(url) {
  // Convertit les liens Google Docs/Sheets/Slides en /preview pour compatibilité iPhone
  return url.replace(
    /(docs\.google\.com\/(document|spreadsheets|presentation)\/d\/[^/]+)\/.*/,
    "$1/preview"
  );
}

// ── NAVIGATION ──────────────────────────────────────────────
let currentCode = "";

function afficher(id) {
  ["screenLogin","screenGroupe","screenApp"].forEach(s => {
    const el = document.getElementById(s);
    el.classList.remove("visible");
    el.style.display = "";
  });
  document.getElementById(id).classList.add("visible");
}

// ── LOGIN ────────────────────────────────────────────────────
function handleLogin() {
  const code = document.getElementById("codeInput").value.trim().toUpperCase();
  const cl = CLASSES[code];
  if (!cl) {
    document.getElementById("errMsg").textContent = "Code inconnu — demande à ton prof 😊";
    return;
  }
  document.getElementById("errMsg").textContent = "";
  currentCode = code;

  if (cl.groupes) {
    document.getElementById("groupeTitre").textContent = cl.nom;
    afficher("screenGroupe");
  } else {
    chargerContenu(null);
  }
}

// ── CHARGEMENT ───────────────────────────────────────────────
async function chargerContenu(groupe) {
  const cl = CLASSES[currentCode];
  let url;
  if (cl.groupes) {
    url = groupe === "1" ? cl.url1
        : groupe === "2" ? cl.url2
        : cl.urlEntier;
  } else {
    url = cl.url;
  }

  document.getElementById("className").textContent =
    cl.nom + (groupe ? " — Groupe " + groupe : "");

  afficher("screenApp");
  document.getElementById("loading").classList.add("visible");
  document.getElementById("content").innerHTML = "";

  try {
    const res  = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);
    const notions = grouperParNotion(rows);
    afficherContenu(notions, cl.color);
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;">
        Impossible de charger les données.<br/>Vérifie ta connexion.
      </div>`;
  }
  document.getElementById("loading").classList.remove("visible");
}

// ── CSV ──────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  // Nettoyer BOM et espaces des en-têtes
  const headers = lines[0]
    .replace(/^\uFEFF/, "")
    .split(",")
    .map(h => h.trim().toLowerCase().replace(/\r/g, ""));

  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    vals.push(cur.trim().replace(/\r/g, ""));
    return Object.fromEntries(headers.map((h, i) => [h, vals[i] || ""]));
  }).filter(r => r.notion && r.notion.trim() !== "" && r.titre && r.titre.trim() !== "" && r.actif !== "0");
}

function grouperParNotion(rows) {
  const map = {};
  rows.forEach(r => {
    const n = r.notion.trim();
    if (!map[n]) map[n] = [];
    map[n].push(r);
  });
  // Trier chaque notion : actif=1 en premier, puis cours, exercices, animations, reste
  const ordre = ["cours", "exercices", "animation", "dm", "ds", "énoncé", "corrigé", "énoncé+corrigé"];
  Object.keys(map).forEach(n => {
    map[n].sort((a, b) => {
      // actif=1 tout en haut
      const aActif = a.actif && a.actif.trim() === "1" ? 0 : 1;
      const bActif = b.actif && b.actif.trim() === "1" ? 0 : 1;
      if (aActif !== bActif) return aActif - bActif;
      // sinon par type
      const ai = ordre.indexOf((a.type||"").toLowerCase().trim());
      const bi = ordre.indexOf((b.type||"").toLowerCase().trim());
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
  });
  return map;
}

// ── AFFICHAGE ────────────────────────────────────────────────
function carteHTML(f, accent) {
  const cfg = typeConfig(f.type);
  const actif1 = f.actif && f.actif.trim() === "1";
  const actif2 = f.actif && f.actif.trim() === "2";
  return `<a class="file-card" href="${nettoyerLien(f.lien)}" target="_blank" rel="noopener"
    style="${(actif1||actif2) ? 'border-color:'+accent+';box-shadow:0 0 0 1px '+accent+'44;' : ''}">
    <div class="file-icon" style="background:${cfg.bg}">${cfg.icon}</div>
    <div class="file-body">
      <div class="file-title">${f.titre}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;">
        <span class="type-badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>
        ${actif1 ? `<span class="badge-actif" style="background:${accent}22;color:${accent}">EN COURS</span>` : ""}
        ${actif2 ? `<span class="badge-actif" style="background:#ef444422;color:#ef4444">⚠️ ÉVAL</span>` : ""}
      </div>
    </div>
    <div class="arrow">↗</div>
  </a>`;
}

function afficherContenu(notions, accent) {
  const el = document.getElementById("content");
  el.innerHTML = "";

  if (Object.keys(notions).length === 0) {
    el.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;">
      Aucun contenu disponible pour l'instant.
    </div>`;
    return;
  }

  // Collecter tous les fichiers actif=2 pour le bloc éval en haut
  const evalFichiers = [];
  Object.values(notions).forEach(fichiers => {
    fichiers.forEach(f => { if (f.actif && f.actif.trim() === "2") evalFichiers.push(f); });
  });

  // Bloc évaluation en haut si nécessaire
  if (evalFichiers.length > 0) {
    const bloc = document.createElement("div");
    bloc.className = "notion-block fu";
    bloc.innerHTML = `
      <div class="notion-header">
        <div class="notion-name" style="color:#ef4444;">⚠️ Évaluation en cours</div>
        <div class="notion-pill" style="background:#ef4444"></div>
      </div>
      ${evalFichiers.map(f => carteHTML(f, accent)).join("")}
    `;
    el.appendChild(bloc);
  }

  // Reste du contenu par notion
  Object.entries(notions).forEach(([notion, fichiers]) => {
    const block = document.createElement("div");
    block.className = "notion-block fu";
    block.innerHTML = `
      <div class="notion-header">
        <div class="notion-name">${notion}</div>
        <div class="notion-pill" style="background:${accent}"></div>
      </div>
      ${fichiers.map(f => carteHTML(f, accent)).join("")}
    `;
    el.appendChild(block);
  });
}

// ── DÉCONNEXION ──────────────────────────────────────────────
function handleLogout() {
  currentCode = "";
  document.getElementById("codeInput").value = "";
  document.getElementById("errMsg").textContent = "";
  document.getElementById("content").innerHTML = "";
  document.getElementById("tipBanner").style.display = "";
  afficher("screenLogin");
}

// ── CLAVIER ──────────────────────────────────────────────────
document.getElementById("codeInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleLogin();
});
</script>
